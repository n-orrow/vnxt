name: Publish to npm
on:
  push:
    tags:
      - 'publish/v*'
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Scoop bucket
        env:
          PAT: ${{ secrets.SCOOP_BUCKET_PAT }}
        run: |
          VERSION=${GITHUB_REF_NAME#publish/v}
          git clone https://x-access-token:${PAT}@github.com/n-orrow/scoop-vnxt.git
          cd scoop-vnxt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" bucket/vnxt.json
          git add bucket/vnxt.json
          git commit -m "chore: bump vnxt to $VERSION"
          git push

  homebrew:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Update Homebrew tap
        env:
          PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          VERSION=${GITHUB_REF_NAME#publish/v}
          git clone https://x-access-token:${PAT}@github.com/n-orrow/homebrew-vnxt.git
          cd homebrew-vnxt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          sed -i "s/version \".*\"/version \"$VERSION\"/" Formula/vnxt.rb
          sed -i "s/vnxt-.*\.tgz/vnxt-$VERSION.tgz/" Formula/vnxt.rb
          git add Formula/vnxt.rb
          git commit -m "chore: bump vnxt to $VERSION"
          git push

  aur:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Publish to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR }}
        run: |
          VERSION=${GITHUB_REF_NAME#publish/v}

          # Set up SSH for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          echo "Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur" >> ~/.ssh/config

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/vnxt.git aur-vnxt
          cd aur-vnxt

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # Copy files from vnxt repo
          cp ../aur/PKGBUILD .
          cp ../aur/.SRCINFO .

          # Update version in PKGBUILD and .SRCINFO
          sed -i "s/pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/pkgver = .*/pkgver = $VERSION/" .SRCINFO
          sed -i "s/vnxt-.*\.tgz/vnxt-$VERSION.tgz/" PKGBUILD
          sed -i "s|vnxt/-/vnxt-.*\.tgz|vnxt/-/vnxt-$VERSION.tgz|" .SRCINFO

          git add PKGBUILD .SRCINFO
          git commit -m "chore: bump vnxt to $VERSION"
          git push

  chocolatey:
    runs-on: windows-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Package and publish to Chocolatey
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $version = "${{ github.ref_name }}" -replace "publish/v", ""
          
          # Update version in nuspec and install script
          (Get-Content chocolatey/vnxt.nuspec) -replace '<version>.*</version>', "<version>$version</version>" | Set-Content chocolatey/vnxt.nuspec
          (Get-Content chocolatey/tools/chocolateyInstall.ps1) -replace "\`$version = '.*'", "`$version = '$version'" | Set-Content chocolatey/tools/chocolateyInstall.ps1
          
          # Pack and push
          choco pack chocolatey/vnxt.nuspec
          choco push vnxt.$version.nupkg --source https://push.chocolatey.org --api-key $env:CHOCO_API_KEY
